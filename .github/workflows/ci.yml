name: CI Pipeline

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # Test Job - Matrix strategy across Python 3.11 and 3.12
  # ---------------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    env:
      PYTHONPATH: ${{ github.workspace }}
      UV_SYSTEM_PYTHON: 1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-python-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-python-${{ matrix.python-version }}-

      - name: Install framework dependencies
        run: uv pip install -e ".[dev]"

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Install requests for API testing
        run: uv pip install requests

      - name: Start mock application in background
        run: |
          python -m cli.main mock-app &
          echo $! > mock_app.pid
          echo "Mock app started with PID $(cat mock_app.pid)"

      - name: Wait for mock app health check
        run: |
          timeout=60
          elapsed=0
          until curl -sf http://127.0.0.1:5000/health > /dev/null 2>&1; do
            if [ "$elapsed" -ge "$timeout" ]; then
              echo "ERROR: Mock app failed to start within ${timeout}s"
              exit 1
            fi
            sleep 2
            elapsed=$((elapsed + 2))
            echo "Waiting for mock app... (${elapsed}s / ${timeout}s)"
          done
          echo "Mock app is healthy"
          curl -sf http://127.0.0.1:5000/health

      - name: Run demo employee creation test
        run: |
          python -m cli.main run \
            --plan examples/plan.demo_create_employee.yaml \
            --env examples/env.local.yaml \
            --no-headful

      - name: Run AI-powered test generation
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python -m cli.main generate http://127.0.0.1:5000 \
            --description "Test login and employee creation functionality" \
            --no-headful

      - name: Run basic API endpoint validation
        run: |
          python -c "
          import requests, sys
          try:
              r = requests.get('http://127.0.0.1:5000/health', timeout=10)
              assert r.status_code == 200, f'Health returned {r.status_code}'
              print('Health check passed')

              r = requests.get('http://127.0.0.1:5000/login', timeout=10)
              assert r.status_code == 200, f'Login page returned {r.status_code}'
              print('Login page accessible')

              print('All API endpoint validations passed')
          except Exception as e:
              print(f'API validation failed: {e}')
              sys.exit(1)
          "

      - name: Stop mock application
        if: always()
        run: |
          if [ -f mock_app.pid ]; then
            kill "$(cat mock_app.pid)" || true
            rm -f mock_app.pid
          fi
          pkill -f "uvicorn.*mock_app" || true

      - name: Validate run.json status
        if: always()
        run: |
          shopt -s nullglob
          run_files=(artifacts/*/run.json)
          if [ ${#run_files[@]} -gt 0 ]; then
            for f in "${run_files[@]}"; do
              status=$(python -c "import json; print(json.load(open('$f')).get('status','unknown'))")
              echo "$f -> status: $status"
              if [ "$status" = "failed" ]; then
                echo "Test failed based on run.json status in $f"
                exit 1
              fi
            done
          else
            echo "No run.json files found, skipping validation"
          fi

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-artifacts-${{ matrix.python-version }}
          path: artifacts/
          retention-days: 30
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Lint Job - Code quality checks
  # ---------------------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: ${{ github.workspace }}
      UV_SYSTEM_PYTHON: 1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-python-3.12-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-python-3.12-

      - name: Install dependencies
        run: uv pip install -e ".[dev]"

      - name: Black formatting check
        run: black --check --diff .

      - name: Ruff linting
        run: ruff check .

      - name: MyPy type checking
        run: mypy .

  # ---------------------------------------------------------------------------
  # Security Job - Vulnerability and static security analysis
  # ---------------------------------------------------------------------------
  security:
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: ${{ github.workspace }}
      UV_SYSTEM_PYTHON: 1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-python-3.12-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-python-3.12-

      - name: Install dependencies
        run: uv pip install -e ".[dev]"

      - name: Safety dependency vulnerability check
        run: safety check

      - name: Bandit static security analysis
        run: bandit -r .
