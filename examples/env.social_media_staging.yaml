name: "Social Media Platform Staging"
description: "Staging environment for social media platform with content creation and interaction testing"

target:
  base_url: "https://staging.social-platform.com"
  timeout: 12000

credentials:
  test_email: "alex.creator.test@example.com"
  test_username: "alexcreator2024"
  test_password: "CreativePass789!"
  alternative_user: "photographybuddy"

test_data:
  hashtags: ["#photography", "#design", "#art", "#creative", "#sunset"]
  locations: ["Golden Gate Bridge, San Francisco", "Central Park, New York", "Venice Beach, California"]
  interests: ["photography", "design", "art", "music", "travel"]
  story_templates: ["simple", "vintage", "modern", "colorful"]
  
content_examples:
  post_captions: [
    "Beautiful sunset from my recent photography session! What do you think? #photography #sunset #creative",
    "Working on some new design concepts today! #design #creative #work",
    "Art is everywhere if you know how to look! #art #inspiration #life"
  ]
  
  comments: [
    "Amazing shot! Love the composition 📸✨",
    "This is incredible! How did you capture this?",
    "So inspiring! Keep up the great work! 🔥"
  ]
  
  messages: [
    "Hi! Love your photography work. Would love to collaborate sometime!",
    "Great content! Following for more inspiration!",
    "Amazing portfolio! Do you do commissioned work?"
  ]

analytics_settings:
  time_periods: ["1d", "7d", "30d", "90d"]
  metrics_tracked: ["likes", "comments", "shares", "reach", "impressions"]
  export_formats: ["CSV", "PDF", "JSON"]

settings:
  headful: false
  slow_mo: 800
  video: true
  screenshots: true
  network_idle_timeout: 2500
  upload_simulation: true