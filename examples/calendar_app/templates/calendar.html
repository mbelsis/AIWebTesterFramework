<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar App</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="calendar-container">
        <header class="header">
            <h1>My Calendar</h1>
            <div class="user-info">
                <span>Welcome, {{ user.full_name }}</span>
                <a href="/logout" class="logout-btn">Logout</a>
            </div>
        </header>

        <div class="calendar-controls">
            <button id="prevMonth" class="nav-btn">&lt; Previous</button>
            <h2 id="currentMonth"></h2>
            <button id="nextMonth" class="nav-btn">Next &gt;</button>
        </div>

        <div class="calendar-grid" id="calendarGrid">
            <div class="day-header">Sun</div>
            <div class="day-header">Mon</div>
            <div class="day-header">Tue</div>
            <div class="day-header">Wed</div>
            <div class="day-header">Thu</div>
            <div class="day-header">Fri</div>
            <div class="day-header">Sat</div>
        </div>

        <!-- Event Modal -->
        <div id="eventModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2 id="modalTitle">Add Event</h2>
                <form id="eventForm">
                    <div class="form-group">
                        <label for="eventTitle">Title:</label>
                        <input type="text" id="eventTitle" name="title" required>
                    </div>
                    <div class="form-group">
                        <label for="eventDescription">Description:</label>
                        <textarea id="eventDescription" name="description" rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="eventDate">Date:</label>
                        <input type="date" id="eventDate" name="date" required>
                    </div>
                    <div class="form-group">
                        <label for="eventTime">Time:</label>
                        <input type="time" id="eventTime" name="time" required>
                    </div>
                    <div class="form-buttons">
                        <button type="submit" class="save-btn">Save Event</button>
                        <button type="button" id="deleteBtn" class="delete-btn" style="display: none;">Delete Event</button>
                        <button type="button" class="cancel-btn" onclick="closeModal()">Cancel</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Event List -->
        <div class="events-section">
            <h3>Upcoming Events</h3>
            <div id="eventsList"></div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
