browser:
  type: "chromium"
  headless: false
  viewport:
    width: 1280
    height: 720
  
timeout:
  default: 10000
  page_load: 30000

video:
  enabled: true
  quality: "high"

screenshots:
  on_failure: true
  on_success: true

evidence:
  collect_console_logs: true
  collect_network_logs: true
  collect_performance_metrics: true

security:
  redaction_enabled: true
  patterns: ["email", "password", "token", "api_key"]

grc_tool:
  base_url: "https://YOUR-GRC-REPL-URL.replit.dev"
  test_credentials:
    username: "testuser@example.com"
    password: "testpassword123"
  
  # GRC-specific test data
  test_data:
    risk_category: "Operational Risk"
    compliance_framework: "ISO 27001"
    department: "IT Security"
    asset_type: "Database"