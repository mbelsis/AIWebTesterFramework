name: "Enterprise Production Environment"
description: "Production-like environment for enterprise dashboard testing with security considerations"

target:
  base_url: "https://dashboard.enterprise-app.com"
  timeout: 20000

credentials:
  admin_username: "admin_user"
  admin_password: "AdminSecure456!"
  two_factor_code: "123456"
  test_user_email: "john.smith@company.com"

test_data:
  analytics_periods: ["7d", "30d", "90d"]
  user_roles: ["standard_user", "manager", "admin", "viewer"]
  permission_groups: ["reporting", "analytics", "user_management", "system_config"]
  bulk_operations: ["role_assignment", "permission_update", "account_activation"]

security_settings:
  session_timeout: 3600
  two_factor_required: true
  audit_logging: true
  log_retention_days: 90

settings:
  headful: false
  slow_mo: 1500
  video: true
  screenshots: true
  network_idle_timeout: 5000
  security_wait_time: 2000